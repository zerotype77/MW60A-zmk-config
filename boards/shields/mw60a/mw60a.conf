# 이 .conf 파일은 MW40A 키보드를 위함
CONFIG_ZMK_KEYBOARD_NAME="Zerotype_MW40A"

# ZMK Studio 활성화
CONFIG_ZMK_STUDIO=y
# 만약 배터리 절약 모드 등을 사용 중이라면 연결 유지를 위해 필요할 수 있음
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# Bluetooth LE 활성화
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y


# 로터리 엔코더 지원 활성화
# CONFIG_EC11=y
# 엔코더 처리를 위한 글로벌 스레드 사용 (입력 지연 방지)
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y


# 포인팅 장치 지원 활성화 (예: 트랙볼, 터치패드 등), 스크롤 쓰려면 필수.
CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# 시프트레지스터 활성화
# CONFIG_SPI=y

# 디스플레이 활성화
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y

# 디스플레이 커스터마이징 활성화
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_HOR=y
# CONFIG_NICE_OLED_CUSTOM_CANVAS_WIDTH=64
# CONFIG_NICE_OLED_CUSTOM_CANVAS_HEIGHT=128

# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y
# CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT=y
# CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y
# CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=n
# CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=y
# CONFIG_NICE_OLED_WIDGET_PROFILE_BIG=y

# CONFIG_ZMK_HID_INDICATORS=y


# I2C 활성화
CONFIG_I2C=y

# 디스플레이가 충돌로 노이즈만 출력 하는 현상을 방지하기 위함
CONFIG_LVGL=y
CONFIG_LV_TICK_CUSTOM=y

# 디스플레이 전원을 토글하기 위함
CONFIG_ZMK_EXT_POWER=y


# 오토시프트 오작동을 방지하기 위함
# CONFIG_ZMK_BEHAVIOR_HOLD_TAP=y
# CONFIG_ZMK_BEHAVIOR_HOLD_TAP_MAX_CAPTURED_EVENTS=120
# CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
# CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5