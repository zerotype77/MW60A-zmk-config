# 이 .conf 파일은 MW60A 키보드를 위함

# ZMK Studio 활성화
CONFIG_ZMK_STUDIO=y
# 만약 배터리 절약 모드 등을 사용 중이라면 연결 유지를 위해 필요할 수 있음
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# Bluetooth LE 활성화
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y


# 로터리 엔코더 지원 활성화
# CONFIG_EC11=y
# 엔코더 처리를 위한 글로벌 스레드 사용 (입력 지연 방지)
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y


# 포인팅 장치 지원 활성화 (예: 트랙볼, 터치패드 등), 스크롤 쓰려면 필수.
# CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# 시프트레지스터 활성화
# CONFIG_SPI=y

# 디스플레이 활성화
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y
# I2C 활성화
CONFIG_I2C=y

# 디스플레이가 충돌로 노이즈만 발생시키는 것을 방지하기 위함
# CONFIG_LVGL=y
# CONFIG_LV_TICK_CUSTOM=y
